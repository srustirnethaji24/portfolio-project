<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Srusti R N</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/custom.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b shadow-lg">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

            <a href="#"
                class="text-2xl font-bold bg-gradient-to-r from-red-400 to-slate-700 text-transparent bg-clip-text">
                SRN
            </a>

            <ul class="hidden md:flex items-center gap-10">
                <li><a href="#projects" class="font-bold hover:text-blue-600">Projects</a></li>
                <li><a href="#education" class="font-bold hover:text-blue-600">Education</a></li>
                <li><a href="#skills" class="font-bold hover:text-blue-600">Skills</a></li>
            </ul>

            <button id="theme-toggle" class="theme-toggle-btn">🌙</button>
        </div>
    </nav>

    <!-- Back to Top -->
    <button id="back-to-top"
        class="fixed bottom-8 left-8 hidden bg-red-400 hover:bg-green-500 text-white px-4 py-3 rounded-full shadow-xl">
        ↑ Top
    </button>

    <!-- Progress Bar -->
    <div id="progress-bar"></div>

    <!-- ================= HERO (CENTERED IMAGE) ================= -->
    <section class="min-h-screen flex flex-col items-center justify-center text-center px-8 py-20 gap-8">

        <!-- IMAGE -->
        <div class="w-40 md:w-56">
            <img src="assests/Mypic.jpeg" alt="Srusti RN photo" class="w-full shadow-xl hover:scale-105 transition">
        </div>

        <!-- NAME -->
        <h1 class="text-5xl font-bold">Srusti RN</h1>

        <!-- TEXT -->
        <p class="text-xl font-semibold">
            I am a <span id="typing-text"></span>
        </p>

        <!-- BUTTONS -->
        <div class="flex flex-col sm:flex-row gap-4">
            <a href="#projects" class="bg-red-400 hover:bg-green-500 px-6 py-3 rounded shadow">
                💻 View Projects
            </a>

            <a href="assests/srusti RN resume  (1).pdf" class="bg-blue-400 hover:bg-green-500 px-6 py-3 rounded shadow">
                📑 Download Resume
            </a>
        </div>

        <!-- STATS -->
        <!-- <div class="flex flex-wrap justify-center gap-4 text-sm font-bold">
            <span>800+ Github commits</span>
            <span>5 Projects</span>
        </div> -->

        <!-- SOCIAL LINKS -->
        <div class="flex flex-col sm:flex-row gap-4">

            <a href="https://github.com/srustirnethaji24/MERN_Stu_FebMay26Mys.git" target="_blank"
                rel="noopener noreferrer"
                class="px-6 py-3 bg-gray-900 text-white rounded-lg hover:scale-105 transition">
                🐙 GitHub
            </a>

            <a href="https://www.linkedin.com/in/srustirn" target="_blank" rel="noopener noreferrer"
                class="px-6 py-3 bg-yellow-600 text-white rounded-lg hover:scale-105 transition">
                💼 LinkedIn
            </a>

            <a href="mailto:srustirnethaji24@gmail.com"
                class="px-6 py-3 bg-pink-500 text-white rounded-lg hover:scale-105 transition">
                ✉️ Gmail
            </a>

        </div>

    </section>

    <!-- ================= PROJECTS ================= -->
    <section id="projects" class="py-20 px-8">

        <h2 class="text-4xl text-center mb-6">My Projects</h2>

        <div class="text-center mb-6">
            <input id="project-search" type="text" placeholder="Search projects..."
                class="border px-4 py-2 rounded w-full max-w-md">
        </div>

        <div id="project-render" class="flex flex-wrap justify-center gap-4 mb-8"></div>

        <div id="projects-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>

    </section>

    <!-- ================= EDUCATION ================= -->
    <section id="education" class="py-20 px-8 text-center">
        <h2 class="text-4xl mb-10">Education</h2>
        <div id="education-list"></div>
    </section>

    <!-- ================= SKILLS ================= -->
    <section id="skills" class="py-20 px-8 bg-gray-100 text-center">

        <h2 class="text-4xl mb-10">Skills</h2>

        <div id="skills-filters" class="mb-6"></div>

        <div id="skills-container" class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
        </div>

    </section>

    <!-- ================= CONTACT ================= -->
    <button id="modal-trigger"
    class="fixed bottom-6 right-6 w-12 h-12 bg-gradient-to-r from-pink-500 to-purple-600 text-white rounded-full shadow-lg hover:scale-110 transition flex items-center justify-center text-sm">
    ☏
</button>

    <div id="contact-modal" class="fixed inset-0 hidden bg-black/50 flex items-center justify-center">

        <div class="bg-white p-6 rounded-lg w-full max-w-md relative">

            <h3 class="text-xl font-bold mb-4">Contact Me</h3>

            <button id="modal-close"
                class="absolute top-3 right-3 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 hover:bg-red-500 hover:text-white transition">
                ×
            </button>

            <form id="contact-form" class="space-y-4 mt-4">

                <input id="contact-name" type="text" placeholder="Your name" class="w-full border px-4 py-2 rounded">

                <input id="contact-email" type="email" placeholder="Email" class="w-full border px-4 py-2 rounded">

                <p id="form-message" class="text-red-500 text-sm"></p>

                <div class="flex gap-4">
                    <button type="button" id="form-cancel">Cancel</button>
                    <button type="submit">Submit</button>
                </div>

            </form>

        </div>

    </div>

    <!-- JS FILES -->
    <script src="js/data/projects.js"></script>
    <script src="js/data/skills.js"></script>
    <script src="js/data/educations.js"></script>
    <script src="js/features/education-render.js"></script>
    <script src="js/features/skills-render.js"></script>
    <script src="js/features/scroll-progress.js"></script>
    <script src="js/features/theme-toggle.js"></script>
    <script src="js/features/scroll-spy.js"></script>
    <script src="js/features/back-to-top.js"></script>
    <script src="js/features/project-render.js"></script>
    <script src="js/features/type-animation.js"></script>
    <script src="js/features/skill-filter.js"></script>
    <script src="js/features/contact-validation.js"></script>
    <script src="js/features/modal.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
